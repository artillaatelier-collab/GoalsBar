<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Twitch Follower Goal Overlay</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { margin:0; background:transparent; font-family:Inter,sans-serif; overflow:hidden; }

    .overlay-wrap {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
    }

    .overlay {
      width:720px; height:82px;
      border-radius:24px;
      background: rgba(12,12,18,0.72);
      border:1px solid rgba(255,255,255,0.15);
      position:relative;
      overflow:hidden;
      backdrop-filter: blur(14px);
    }

    .progress-fill {
      position:absolute;
      left:0; top:0; height:100%;
      width:0%;
      background: linear-gradient(90deg,#8b5cf6,#ec4899);
      transition: width .8s ease;
    }

    .content {
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 24px;
      color:white;
    }

    .label { font-size:12px; opacity:.8; }
    .goal { font-size:20px; font-weight:700; }
    .percent { font-size:16px; font-weight:700; }

    .login {
      position:fixed;
      top:20px; left:20px;
      padding:10px 14px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      background:#9146FF;
      color:white;
      font-weight:700;
      z-index:9999;
    }
  </style>
</head>

<body>

<button class="login" onclick="loginTwitch()">Login Twitch</button>

<div class="overlay-wrap">
  <div class="overlay">
    <div class="progress-fill" id="fill"></div>

    <div class="content">
      <div>
        <div class="label">FOLLOWER GOAL</div>
        <div class="goal" id="goalText">0 / 100</div>
      </div>
      <div class="percent" id="percent">0%</div>
    </div>
  </div>
</div>

<script>
/* =========================
   CONFIG
========================= */
const TWITCH_CLIENT_ID = "1m5oe4pcm81nctep2f9rrzw3jhvv6i";
const REDIRECT_URI = window.location.origin + window.location.pathname;

const SCOPES = [
  "moderator:read:followers",
  "user:read:follows"
].join(" ");

/* =========================
   AUTH
========================= */

function loginTwitch() {
  const url =
    "https://id.twitch.tv/oauth2/authorize" +
    "?client_id=" + TWITCH_CLIENT_ID +
    "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
    "&response_type=token" +
    "&scope=" + encodeURIComponent(SCOPES);

  window.location = url;
}

function getTokenFromHash() {
  const hash = window.location.hash;
  if (!hash.includes("access_token")) return null;

  const params = new URLSearchParams(hash.replace("#", ""));
  const token = params.get("access_token");

  if (token) {
    localStorage.setItem("twitch_token", token);
    window.location.hash = "";
  }

  return token;
}

let TWITCH_TOKEN = localStorage.getItem("twitch_token") || getTokenFromHash();

/* =========================
   CONFIG STATE
========================= */

let settings = {
  goal: 500,
  current: 0
};

/* =========================
   FETCH FOLLOWERS (Worker API)
========================= */

async function fetchFollowers() {
  try {
    const res = await fetch("https://goals-bar.artillaatelier.workers.dev/");
    const data = await res.json();

    if (data.followers !== undefined) {
      settings.current = data.followers;
      render();
    }
  } catch (e) {
    console.error(e);
  }
}

/* =========================
   RENDER
========================= */

function render() {
  const percent = Math.min((settings.current / settings.goal) * 100, 100);

  document.getElementById("goalText").textContent =
    `${settings.current} / ${settings.goal}`;

  document.getElementById("percent").textContent =
    Math.round(percent) + "%";

  document.getElementById("fill").style.width =
    percent + "%";
}

/* =========================
   TWITCH EVENTSUB WS
========================= */

let socket;

function connectWS() {
  if (!TWITCH_TOKEN) {
    console.log("No token yet");
    return;
  }

  socket = new WebSocket("wss://eventsub.wss.twitch.tv/ws");

  let sessionId;

  socket.onmessage = async (event) => {
    const msg = JSON.parse(event.data);

    if (msg.metadata.message_type === "session_welcome") {
      sessionId = msg.payload.session.id;
      subscribe(sessionId);
    }

    if (msg.metadata.message_type === "notification") {
      if (msg.metadata.subscription_type === "channel.follow") {
        fetchFollowers();
      }
    }
  };
}

async function subscribe(sessionId) {
  const broadcasterId = "YOUR_BROADCASTER_ID";

  await fetch("https://api.twitch.tv/helix/eventsub/subscriptions", {
    method: "POST",
    headers: {
      "Client-ID": TWITCH_CLIENT_ID,
      "Authorization": "Bearer " + TWITCH_TOKEN,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "channel.follow",
      version: "2",
      condition: {
        broadcaster_user_id: broadcasterId
      },
      transport: {
        method: "websocket",
        session_id: sessionId
      }
    })
  });
}

/* =========================
   INIT
========================= */

render();

if (TWITCH_TOKEN) {
  connectWS();
  fetchFollowers();
}
</script>

</body>
</html>
