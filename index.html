<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Twitch Follower Goal Overlay</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
  /* 調整為你的圖片寬高比例 */
      --overlay-width: 800px;
      --overlay-height: 80px;

  /* 指向你剛才存的圖片檔名 */
      --bg-image: url('./bg-overlay.png'); 

      --overlay-bg: rgba(12,12,18,0.72); /* 介面保留，但 overlay 將不再使用 */
      --text-color: #ffffff;
      --progress-color: linear-gradient(90deg, #8b5cf6 0%, #ec4899 100%);
     }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;

      font-family: "Inter", sans-serif;
    }

    body {
      background: transparent;
    }

   /* =========================
        OVERLAY
    ========================== */

    .overlay-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      position: relative;
      width: var(--overlay-width);
      height: var(--overlay-height);
      
      /* 套用自定義圖片為背景 */
      background-image: var(--bg-image);
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;

      background-color: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      border-radius: 0;
    }

    /* 🌟 魔法遮罩：用 clip-path 剪出原本背景的「圓形徽章」，蓋在進度條上面 */
    .overlay::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--bg-image);
      background-size: 100% 100%;
      background-position: center;
      
      z-index: 2; /* 確保它在進度條（z-index:1）的上方 */
      /* 這個數值代表：剪出一個半徑 42px 的圓，圓心在 X:40px, Y:40px。可依圖片微調 */
      clip-path: circle(20px at 40px 40px); 
      pointer-events: none;
    }

    .progress-track {
      position: absolute;
      
      /* 讓進度條從徽章的「圓心」開始，這樣露出來的部分就會像從底下鑽出來的 */
      left: 40px; 
      
      /* 這些數值是為了讓進度條「縮進」灰色內框中，請根據圖片邊界微調 */
      right: 12px; 
      top: 18px;   
      bottom: 18px;
      
      border-radius: 4px; 
      overflow: hidden;
      z-index: 1; /* 夾在底圖(0)跟徽章遮罩(2)的中間 */
    }

    .progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%; /* 這個會被 JS 自動控制 */
      background: var(--progress-color);
      transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
    }

    /* 文字排版：確保 z-index 最高，且左邊推開距離避開徽章 */
    .content {
      position: relative;
      z-index: 3; /* 最頂層，不會被徽章或進度條蓋住 */
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      
      padding-left: 95px; /* 把文字往右推，避開徽章 */
      padding-right: 24px;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-color);
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .goal-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-color);
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .percent {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-color);
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-color);
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .goal-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-color);
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .percent {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-color);
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    /* =========================
        SETTINGS PANEL
    ========================== */

    .settings {
      position: fixed;

      top: 20px;
      right: 20px;

      width: 340px;
      max-height: calc(100vh - 40px);

      overflow-y: auto;

      background:
        rgba(18,18,22,0.92);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 20px;

      padding: 18px;

      backdrop-filter: blur(16px);

      box-shadow:
        0 10px 30px rgba(0,0,0,0.35);

      z-index: 9999;
    }

    .settings h2 {
      margin: 0 0 16px;

      font-size: 18px;
      color: white;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;

      margin-bottom: 6px;

      font-size: 12px;
      font-weight: 600;

      color:
        rgba(255,255,255,0.7);
    }

    .field input {
      width: 100%;

      border: none;
      outline: none;

      padding: 11px 12px;

      border-radius: 12px;

      background:
        rgba(255,255,255,0.08);

      color: white;

      font-size: 14px;
      font-family: inherit;
    }

    .field input[type="range"] {
      padding: 0;
      background: transparent;
      accent-color: #f472b6;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .color-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .color-control {
      flex: 1;
      min-width: 0;
    }

    .hex-input {
      margin-top: 10px;
      text-transform: uppercase;
    }

    .picker-panel {
      position: relative;

      width: 100%;
      height: 148px;

      border-radius: 16px;
      overflow: hidden;

      cursor: crosshair;

      background-color: rgb(255, 0, 0);
      background-image:
        linear-gradient(to top, black, transparent),
        linear-gradient(to right, white, transparent);

      border: 1px solid rgba(255,255,255,0.08);
    }

    .picker-thumb {
      position: absolute;

      width: 22px;
      height: 22px;

      border: 3px solid white;
      border-radius: 50%;

      box-shadow: 0 2px 8px rgba(0,0,0,0.35);

      transform: translate(-50%, -50%);

      pointer-events: none;
    }

    .picker-meta {
      display: flex;
      align-items: center;
      gap: 10px;

      margin-top: 10px;
    }

    .picker-meta label {
      margin: 0;

      font-size: 12px;
      color: rgba(255,255,255,0.65);
    }

    .hue-slider {
      flex: 1;
      height: 14px;

      appearance: none;
      -webkit-appearance: none;

      border-radius: 999px;
      outline: none;
      background: transparent;
      --hue-gradient: linear-gradient(
        90deg,
        #ff0000 0%,
        #ffff00 16.66%,
        #00ff00 33.33%,
        #00ffff 50%,
        #0000ff 66.66%,
        #ff00ff 83.33%,
        #ff0000 100%
      );
    }

    .hue-slider::-webkit-slider-runnable-track {
      height: 14px;

      border-radius: 999px;

      background: var(--hue-gradient);
    }

    .hue-slider::-moz-range-track {
      height: 14px;

      border-radius: 999px;
      border: none;

      background: var(--hue-gradient);
    }

    .hue-slider::-webkit-slider-thumb {
      appearance: none;

      width: 20px;
      height: 20px;

      border: 3px solid white;
      border-radius: 50%;

      background: var(--hue-color, #ff0000);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);

      cursor: pointer;
    }

    .hue-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;

      border: 3px solid white;
      border-radius: 50%;

      background: var(--hue-color, #ff0000);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);

      cursor: pointer;
    }

    .hue-value {
      min-width: 48px;

      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .picker-readout {
      display: flex;
      justify-content: space-between;
      gap: 10px;

      margin-top: 8px;
    }

    .picker-readout span {
      font-size: 11px;
      color: rgba(255,255,255,0.58);
    }

    .picker-readout output {
      margin-left: 4px;
      color: rgba(255,255,255,0.78);
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-chip {
      width: 42px;
      height: 42px;

      flex: 0 0 42px;

      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);

      background-image:
        linear-gradient(45deg, rgba(255,255,255,0.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.08) 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;

      overflow: hidden;
    }

    .color-chip::after {
      content: "";

      display: block;
      width: 100%;
      height: 100%;

      background: var(--chip-color, transparent);
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .range-wrap output {
      min-width: 44px;

      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .btn {
      width: 100%;

      border: none;
      cursor: pointer;

      margin-top: 10px;

      padding: 13px;

      border-radius: 14px;

      font-weight: 700;
      font-size: 14px;

      color: white;

      background:
        linear-gradient(
          90deg,
          #8b5cf6,
          #ec4899
        );
    }

    .hint {
      margin-top: 14px;

      font-size: 11px;
      line-height: 1.5;

      color:
        rgba(255,255,255,0.5);
    }

    .save-status {
      min-height: 18px;

      margin-top: 10px;

      font-size: 12px;
      color: rgba(255,255,255,0.75);
    }

    .toggle-btn {
      position: fixed;

      top: 20px;
      left: 20px;

      z-index: 10000;

      border: none;
      cursor: pointer;

      padding: 10px 14px;

      border-radius: 12px;

      background:
        rgba(20,20,25,0.85);

      color: white;

      backdrop-filter: blur(12px);
    }

    body.ui-hidden .settings,
    body.ui-hidden .toggle-btn {
      display: none;
    }

    .hidden {
      display: none;
    }

    body.obs-mode .settings,
    body.obs-mode .toggle-btn {
      display: none;
    }
  </style>
</head>

<body>

  <button
    class="toggle-btn"
    onclick="toggleSettings()"
  >
    ⚙ Settings
  </button>

  <!-- SETTINGS -->
  <div class="settings" id="settingsPanel">

    <h2>Follower Goal Settings</h2>

  <!-- OVERLAY -->
  <div class="overlay-wrap">

<div class="overlay" id="overlay">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="content">
        <div class="left">
          <div class="label" id="labelText"></div>
          <div class="goal-text" id="goalText"></div>
        </div>
        <div class="percent" id="percentText"></div>
        
      </div>

  <script>

    /* =========================
        TWITCH 授權設定 (請在此處修改)
    ========================== */
    const TWITCH_CLIENT_ID = "1m5oe4pcm81nctep2f9rrzw3jhvv6i";
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    const SCOPES = [
    "moderator:read:followers",
    "user:read:follows"
    ].join(" ");
    
    function loginTwitch() {
    const url =
    "https://id.twitch.tv/oauth2/authorize" +
    "?client_id=" + TWITCH_CLIENT_ID +
    "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
    "&response_type=token" +
    "&scope=" + encodeURIComponent(SCOPES);

    window.location = url;
  }

  function getTokenFromHash() {
  const hash = window.location.hash;
  if (!hash.includes("access_token")) return null;

  const params = new URLSearchParams(hash.replace("#", ""));
  const token = params.get("access_token");

  if (token) {
    localStorage.setItem("twitch_token", token);
    window.location.hash = "";
  }

  return token;
}

let TWITCH_TOKEN = localStorage.getItem("twitch_token") || getTokenFromHash();
    /* =========================
        DEFAULTS & SETTINGS
    ========================== */

    const DEFAULTS = {
      label: "FOLLOWER GOAL",
      goal: 500,
      suffix: "Followers",
      channelName: "artilla_ch",
      current: 0,
      backgroundColor: "#0c0c12",
      backgroundOpacity: 72,
      textColor: "#ffffff",
      progressStartColor: "#8b5cf6",
      progressEndColor: "#ec4899"
    };

    let settings = {
      ...DEFAULTS,
      ...JSON.parse(
        localStorage.getItem(
          "followerGoalSettings"
        ) || "{}"
      )
    };

    // 強制歸零：無論快取記什麼，啟動時強制從0開始
    settings.current = 0;

    let syncBgColorControl = function() {};
    let syncTextColorControl = function() {};
    let syncProgressStartControl = function() {};
    let syncProgressEndControl = function() {};

    /* =========================
        OBS MODE
    ========================== */

    if (window.location.search.includes("obs")) {
      document.body.classList.add("obs-mode");
    }

    /* =========================
        RENDER
    ========================== */

    function renderOverlay() {
      const current = isNaN(Number(settings.current)) ? 0 : Number(settings.current);
      const goal = Number(settings.goal ?? 1);

      const percent = Math.min((current / goal) * 100, 100);

      const backgroundColor = hexToRgba(settings.backgroundColor, settings.backgroundOpacity / 100);
      const progressGradient = `linear-gradient(90deg, ${settings.progressStartColor} 0%, ${settings.progressEndColor} 100%)`;

      labelText.textContent = settings.label;
      goalText.textContent = `${current} / ${settings.goal} ${settings.suffix}`;
      percentText.textContent = `${Math.round(percent)}%`;
      progressFill.style.width = `${percent}%`;

      document.documentElement.style.setProperty("--overlay-bg", backgroundColor);
      document.documentElement.style.setProperty("--text-color", settings.textColor);
      document.documentElement.style.setProperty("--progress-color", progressGradient);

      syncColorPreviews();
    }

    /* =========================
        INPUTS
    ========================== */

    function populateInputs() {
      labelInput.value = settings.label;
      goalInput.value = settings.goal;
      suffixInput.value = settings.suffix;
      bgOpacityInput.value = Number(settings.backgroundOpacity);
      bgOpacityValue.value = `${settings.backgroundOpacity}%`;
      syncColorPreviews();
    }

    /* =========================
        COLOR HELPERS
    ========================== */

    function normalizeHexColor(color) {
      return /^#[0-9a-f]{6}$/i.test(color) ? color : "#ffffff";
    }

    function hexToRgb(hex) {
      const normalized = normalizeHexColor(hex).slice(1);
      return {
        red: parseInt(normalized.slice(0, 2), 16),
        green: parseInt(normalized.slice(2, 4), 16),
        blue: parseInt(normalized.slice(4, 6), 16)
      };
    }

    function clampByte(value) {
      return Math.max(0, Math.min(255, Number(value) || 0));
    }

    function rgbToHex(red, green, blue) {
      return `#${[red, green, blue]
        .map(function(value) {
          return clampByte(value).toString(16).padStart(2, "0");
        }).join("")}`;
    }

    function rgbToHsv(red, green, blue) {
      const r = clampByte(red) / 255;
      const g = clampByte(green) / 255;
      const b = clampByte(blue) / 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const delta = max - min;

      let hue = 0;

      if (delta !== 0) {
        if (max === r) {
          hue = ((g - b) / delta) % 6;
        } else if (max === g) {
          hue = (b - r) / delta + 2;
        } else {
          hue = (r - g) / delta + 4;
        }
      }

      hue = Math.round(hue * 60);
      if (hue < 0) hue += 360;

      return {
        hue,
        saturation: max === 0 ? 0 : delta / max,
        value: max
      };
    }

    function hsvToRgb(hue, saturation, value) {
      const normalizedHue = ((Number(hue) % 360) + 360) % 360;
      const chroma = value * saturation;
      const segment = normalizedHue / 60;
      const x = chroma * (1 - Math.abs((segment % 2) - 1));
      const match = value - chroma;

      let red = 0, green = 0, blue = 0;

      if (segment >= 0 && segment < 1) {
        red = chroma; green = x;
      } else if (segment < 2) {
        red = x; green = chroma;
      } else if (segment < 3) {
        green = chroma; blue = x;
      } else if (segment < 4) {
        green = x; blue = chroma;
      } else if (segment < 5) {
        red = x; blue = chroma;
      } else {
        red = chroma; blue = x;
      }

      return {
        red: Math.round((red + match) * 255),
        green: Math.round((green + match) * 255),
        blue: Math.round((blue + match) * 255)
      };
    }

    function hexToRgba(hex, alpha) {
      const rgb = hexToRgb(hex);
      return `rgba(${rgb.red}, ${rgb.green}, ${rgb.blue}, ${alpha.toFixed(2)})`;
    }

    function bindColorControl(config) {
      const hexInput = document.getElementById(config.hexInputId);
      const panel = document.getElementById(config.panelId);
      const thumb = document.getElementById(config.thumbId);
      const hueInput = document.getElementById(config.hueInputId);
      const hueValue = document.getElementById(config.hueValueId);
      const saturationValue = document.getElementById(config.saturationValueId);
      const brightnessValue = document.getElementById(config.brightnessValueId);

      const state = { hue: 0, saturation: 0, value: 1 };

      function syncFromSettings() {
        const rgb = hexToRgb(settings[config.settingKey]);
        const hsv = rgbToHsv(rgb.red, rgb.green, rgb.blue);

        state.hue = hsv.saturation === 0 ? state.hue : hsv.hue;
        state.saturation = hsv.saturation;
        state.value = hsv.value;

        hexInput.value = settings[config.settingKey].toUpperCase();
        hueInput.value = Math.round(state.hue);
        hueValue.value = `${Math.round(state.hue)}deg`;
        saturationValue.value = `${Math.round(state.saturation * 100)}%`;
        brightnessValue.value = `${Math.round(state.value * 100)}%`;

        const baseColor = hsvToRgb(state.hue, 1, 1);
        const hueColor = rgbToHex(baseColor.red, baseColor.green, baseColor.blue);

        panel.style.backgroundColor = hueColor;
        hueInput.style.setProperty("--hue-color", hueColor);
        thumb.style.left = `${state.saturation * 100}%`;
        thumb.style.top = `${(1 - state.value) * 100}%`;
      }

      function commitFromState() {
        const rgb = hsvToRgb(state.hue, state.saturation, state.value);
        settings[config.settingKey] = rgbToHex(rgb.red, rgb.green, rgb.blue);
        renderOverlay();
      }

      function updateFromPanel(event) {
        const bounds = panel.getBoundingClientRect();
        const saturation = Math.min(1, Math.max(0, (event.clientX - bounds.left) / bounds.width));
        const value = 1 - Math.min(1, Math.max(0, (event.clientY - bounds.top) / bounds.height));

        state.saturation = saturation;
        state.value = value;
        commitFromState();
      }

      panel.addEventListener("pointerdown", function(event) {
        event.preventDefault();
        panel.setPointerCapture(event.pointerId);
        updateFromPanel(event);
      });

      panel.addEventListener("pointermove", function(event) {
        if ((event.buttons & 1) !== 1) return;
        updateFromPanel(event);
      });

      hexInput.addEventListener("input", function() {
        const nextColor = hexInput.value.trim().toUpperCase();
        if (!/^#[0-9A-F]{6}$/.test(nextColor)) return;
        settings[config.settingKey] = nextColor.toLowerCase();
        renderOverlay();
      });

      hueInput.addEventListener("input", function() {
        state.hue = Number(hueInput.value);
        commitFromState();
      });

      return syncFromSettings;
    }

    syncBgColorControl = bindColorControl({
      settingKey: "backgroundColor",
      panelId: "bgColorPanel",
      thumbId: "bgColorThumb",
      hexInputId: "bgColorHexInput",
      hueInputId: "bgColorHueInput",
      hueValueId: "bgColorHueValue",
      saturationValueId: "bgColorSaturationValue",
      brightnessValueId: "bgColorBrightnessValue"
    });

    syncTextColorControl = bindColorControl({
      settingKey: "textColor",
      panelId: "textColorPanel",
      thumbId: "textColorThumb",
      hexInputId: "textColorHexInput",
      hueInputId: "textColorHueInput",
      hueValueId: "textColorHueValue",
      saturationValueId: "textColorSaturationValue",

    syncProgressStartControl = bindColorControl({
      settingKey: "progressStartColor",
      panelId: "progressStartPanel",
      thumbId: "progressStartThumb",
      hexInputId: "progressStartHexInput",
      hueInputId: "progressStartHueInput",
      hueValueId: "progressStartHueValue",
      saturationValueId: "progressStartSaturationValue",
      brightnessValueId: "progressStartBrightnessValue"
    });

    syncProgressEndControl = bindColorControl({
      settingKey: "progressEndColor",
      panelId: "progressEndPanel",
      thumbId: "progressEndThumb",
      hexInputId: "progressEndHexInput",
      hueInputId: "progressEndHueInput",
      hueValueId: "progressEndHueValue",
      saturationValueId: "progressEndSaturationValue",
      brightnessValueId: "progressEndBrightnessValue"
    });

    function syncColorPreviews() {
      bgColorPreview.style.setProperty("--chip-color", hexToRgba(settings.backgroundColor, settings.backgroundOpacity / 100));
      textColorPreview.style.setProperty("--chip-color", settings.textColor);
      progressStartPreview.style.setProperty("--chip-color", settings.progressStartColor);
      progressEndPreview.style.setProperty("--chip-color", settings.progressEndColor);
      bgOpacityValue.value = `${settings.backgroundOpacity}%`;

      syncBgColorControl();
      syncTextColorControl();
      syncProgressStartControl();
      syncProgressEndControl();
    }

    bgOpacityInput.addEventListener("input", function() {
      settings.backgroundOpacity = Number(bgOpacityInput.value);
      renderOverlay();
    });

    /* =========================
        KEYBOARD SHORTCUTS
    ========================== */

    document.addEventListener("keydown", function(event) {
      if (event.key !== "F2") return;
      if (document.body.classList.contains("obs-mode")) return;
      event.preventDefault();
      toggleSettings();
    });

    /* =========================
        SAVE
    ========================== */

    function saveSettings() {
      settings.label = labelInput.value;
      settings.goal = Number(goalInput.value);
      settings.suffix = suffixInput.value;
      settings.backgroundOpacity = Number(bgOpacityInput.value);

      localStorage.setItem("followerGoalSettings", JSON.stringify(settings));
      renderOverlay();

      saveStatus.textContent = "Overlay saved.";
      window.clearTimeout(saveSettings.timeoutId);
      saveSettings.timeoutId = window.setTimeout(function() {
        saveStatus.textContent = "";
      }, 1600);
    }

    function toggleSettings() {
      document.body.classList.toggle("ui-hidden");
    }

    /* =========================
        TWITCH FOLLOWER SYNC (Fetch API)
    ========================== */

    async function fetchFollowerCount() {
      try {
        const response = await fetch("https://goals-bar.artillaatelier.workers.dev/");
        const data = await response.json();
        if (data.followers !== undefined) {
          settings.current = data.followers;
          renderOverlay();
        }
      } catch(error) {
        console.error("Failed to fetch followers API:", error);
      }
    }

   /* =========================
   TWITCH EVENTSUB WS
========================= */

let socket;

function connectWS() {
  if (!TWITCH_TOKEN) {
    console.log("No token yet");
    return;
  }

  socket = new WebSocket("wss://eventsub.wss.twitch.tv/ws");

  let sessionId;

  socket.onmessage = async (event) => {
    const msg = JSON.parse(event.data);

    if (msg.metadata.message_type === "session_welcome") {
      sessionId = msg.payload.session.id;
      subscribe(sessionId);
    }

   if (msg.metadata.message_type === "notification") {
      if (msg.metadata.subscription_type === "channel.follow") {
        fetchFollowerCount(); // 修正為正確的函數名稱
      }
    }
  };
}

async function subscribe(sessionId) {
  const broadcasterId = "YOUR_BROADCASTER_ID";

  await fetch("https://api.twitch.tv/helix/eventsub/subscriptions", {
    method: "POST",
    headers: {
      "Client-ID": TWITCH_CLIENT_ID,
      "Authorization": "Bearer " + TWITCH_TOKEN,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "channel.follow",
      version: "2",
      condition: {
        broadcaster_user_id: broadcasterId
      },
      transport: {
        method: "websocket",
        session_id: sessionId
      }
    })
  });
}

/* =========================
   INIT
========================= */

populateInputs(); // 建議加上這個，讓右側設定面板讀取預設值
renderOverlay();  // 修正名稱

if (TWITCH_TOKEN) {
  connectWS();
  fetchFollowerCount(); // 修正名稱
}
